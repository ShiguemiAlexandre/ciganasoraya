<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMC Cartomancia - Portal Místico</title>
    <meta name="description" content="PMC Cartomancia — Consultas espirituais com responsabilidade, sigilo e direcionamento. Agende sua leitura com atendimento personalizado e acolhimento verdadeiro." />
    <link rel="icon" href="./favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="./icon-16x16.png"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #1a0b2e;
            --mid-purple: #3d1d5e;
            --mystic-lilac: #9d50bb;
            --mystic-gold: #d4af37;
            --ethereal-white: #fdfcfb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-purple);
            color: var(--ethereal-white);
            overflow-x: hidden;
        }
        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }
        .bg-mystic-texture {
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(157, 80, 187, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/dark-matter.png");
            background-attachment: fixed;
        }
        
        .perspective-2000 { perspective: 2000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }

        /* Flip Animation */
        @keyframes flip-reveal {
            0% { transform: rotateY(180deg) scale(0.8); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        .animate-flip {
            animation: flip-reveal 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        /* Floating Movement */
        @keyframes mystic-float {
            0%, 100% { transform: translateY(0) rotateX(var(--rx)) rotateY(var(--ry)); }
            50% { transform: translateY(-20px) rotateX(var(--rx)) rotateY(var(--ry)); }
        }
        .floating-card {
            animation: mystic-float 6s ease-in-out infinite;
        }

        /* Card Sheen */
        .card-glow-overlay {
            background: radial-gradient(circle at var(--x) var(--y), rgba(212, 175, 55, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--deep-purple); }
        ::-webkit-scrollbar-thumb { background: var(--mystic-lilac); border-radius: 10px; }
    </style>
